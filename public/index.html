<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CM Sound Player</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">CM Sound Player</div>
        <div class="search">
          <input id="search" type="search" placeholder="Rechercher…" autocomplete="off" />
        </div>
        <button id="btnRemote" class="btn btn--small" title="Télécommande">Télécommande</button>
      </header>

      <div id="remoteModal" class="modal-overlay hidden">
        <div class="modal modal--qr">
          <h3>Contrôler depuis votre téléphone</h3>
          <p style="font-size: 14px; color: #94a3b8; margin-bottom: 20px;">
            Scannez ce QR code avec votre téléphone ou ouvrez l'URL :
          </p>
          <div id="qrCode"></div>
          <div id="remoteUrl" style="font-size: 12px; color: #F26A8D; margin-top: 15px; word-break: break-all;"></div>
          <div class="modal-buttons" style="margin-top: 20px;">
            <button id="closeRemote" class="btn">Fermer</button>
          </div>
        </div>
      </div>

      <main class="content">
        <div id="status" class="status">Chargement…</div>
        <div id="list" class="list" aria-label="Liste des sons"></div>
      </main>

      <footer class="player" id="player" aria-label="Lecteur audio">
        <div class="player__left">
          <button id="playPause" class="btn" disabled>Play</button>
          <div class="meta">
            <div id="title" class="title">Aucun son</div>
            <div class="time">
              <span id="cur">0:00</span>
              <span class="sep">/</span>
              <span id="dur">0:00</span>
            </div>
          </div>
        </div>

        <div class="player__center">
          <div class="progress-wrapper">
            <div class="progress-bar-container">
              <div id="keypointMarkers" class="keypoint-markers"></div>
              <input id="progress" class="progress" type="range" min="0" max="1000" value="0" disabled />
            </div>
            <div id="keypointNames" class="keypoint-names"></div>
          </div>
          <div class="keypoint-controls">
            <button id="addKeypoint" class="btn btn--small" disabled>+ Point</button>
            <button id="goToKeypoint" class="btn btn--small" disabled>Aller à…</button>
          </div>
        </div>

        <div class="player__right">
          <div class="speed">
            <span class="speed__label">Vit</span>
            <div class="speed__buttons">
              <button class="speed__btn" data-speed="0.25">0.25x</button>
              <button class="speed__btn" data-speed="0.5">0.5x</button>
              <button class="speed__btn speed__btn--active" data-speed="1">1x</button>
              <button class="speed__btn" data-speed="1.25">1.25x</button>
              <button class="speed__btn" data-speed="1.5">1.5x</button>
            </div>
          </div>
          <div class="vol">
            <span class="vol__label">Vol</span>
            <input id="volume" type="range" min="0" max="5" step="0.01" value="1" />
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
